name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (Astro)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx astro check --minimumFailingSeverity error 2>&1 || echo "astro check no disponible, se salta"

      - name: Build
        run: npm run build

  edge-functions:
    name: Edge Functions (Deno)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supabase
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check translate
        run: deno check functions/translate/index.ts

      - name: Check generate
        run: deno check functions/generate/index.ts

      - name: Check validate
        run: deno check functions/validate/index.ts

      - name: Check publish
        run: deno check functions/publish/index.ts
